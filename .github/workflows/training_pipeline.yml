name: Training Pipeline — Every Day

on:
  schedule:
    - cron: "0 2 * * *"   # runs every day at 2:00 AM UTC
  workflow_dispatch:       # lets you run it manually too

jobs:
  train-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests pandas numpy scikit-learn xgboost shap

      - name: Run backfill to refresh data
        env:
          AQI_TOKEN: ${{ secrets.AQI_TOKEN }}
        run: python backfill_pipeline.py

      - name: Run training pipeline
        run: python training_pipeline.py

      - name: Commit updated model
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add model/ aqi_historical.csv
          git diff --staged --quiet || git commit -m "Auto: model retrained $(date -u '+%Y-%m-%d')"
          git push
