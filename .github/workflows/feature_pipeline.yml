name: Feature Pipeline — Every Hour

on:
  schedule:
    - cron: "0 * * * *"   # runs at the top of every hour
  workflow_dispatch:       # lets you run it manually too

jobs:
  fetch-aqi:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests pandas numpy

      - name: Run feature pipeline
        env:
          AQI_TOKEN: ${{ secrets.AQI_TOKEN }}
        run: python feature_pipeline.py

      - name: Commit and push updated CSV
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add aqi_features.csv
          git diff --staged --quiet || git commit -m "Auto: feature update $(date -u '+%Y-%m-%d %H:%M')"
          git push
